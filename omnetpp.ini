[General]
# sqsqtest
network = Network

**.ospf.ospfConfig = xmldoc("sqsqASConfig.xml")

warmup-period = 20s
sim-time-limit = 130.001s

**.ospfRouter_*_*.numApps = 2
**.app[0].typename = "UdpBasicApp"
**.app[0].destPort = 1234
**.app[0].messageLength = 32 bytes
**.app[0].sendInterval = 0.1s
**.app[0].startTime = 20s
**.app[0].stopTime = 120s
**.app[1].typename = "UdpBasicApp"
**.app[1].localPort = 1234
**.app[1].destPort = 1111
**.app[1].messageLength = 32 bytes
**.app[1].sendInterval = 0.1s

**.scalar-recording = false # shutdown the recording, only focus on the data we need
**.vector-recording = false

#**.result-recording-modes = default
#**.app[0].eed.result-recording-modes = vector


**.arp.cacheTimeout = 10s

#**.ospfRouter_*_*.app[0].destAddressesesses = "ospfRouter_4_4"
#**.ospfRouter_3_1.app[0].destAddressesesses = "ospfRouter_4_2"
#**.ospfRouter_2_1.app[0].destAddressesesses = "ospfRouter_3_2"

